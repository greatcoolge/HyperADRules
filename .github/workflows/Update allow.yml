name: Update allow
on: 
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
          
      - name: Update Rules
        continue-on-error: true
        run: |
          bash ./domain/aallowlist.sh
          
      - name: Update ReadMe
        run: |
          bash ./data/script/clean-readme.sh
          
      - name: Git push assets to Github
        run: |
          export TZ="Asia/Shanghai"
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git branch -m master
          git add --all
          git commit -m "Updated at $(date +'%Y-%m-%d %H:%M:%S')（北京时间）"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} HEAD:master --force
          
      - name: Delete old workflow runs (keep last 30 days)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // 计算30天前的日期
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 30);
            
            console.log(`保留 ${cutoffDate.toISOString().split('T')[0]} 之后的运行记录`);
            
            // 获取所有工作流运行
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 100
            });
            
            let deletedCount = 0;
            
            // 删除30天前的运行记录
            for (const run of runs.workflow_runs) {
              const runDate = new Date(run.created_at);
              if (runDate < cutoffDate) {
                console.log(`删除: #${run.run_number} (${run.name}) - ${run.created_at}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
                deletedCount++;
              }
            }
            
            console.log(`✅ 已删除 ${deletedCount} 条30天前的运行记录`);
